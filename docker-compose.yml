version: "3.9"

networks:
  shieldnet-edge:
    driver: bridge

volumes:
  kafka-data:
  influx-data:
  models-data:

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports: ["1883:1883", "8883:8883"]
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./certs:/mosquitto/certs
    restart: always
    networks: [shieldnet-edge]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes: [kafka-data:/var/lib/zookeeper]
    restart: always
    networks: [shieldnet-edge]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 2
    volumes: [kafka-data:/var/lib/kafka]
    restart: always
    networks: [shieldnet-edge]

  influxdb:
    image: influxdb:2.7
    ports: ["8086:8086"]
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: shieldnet
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: shieldnet
      DOCKER_INFLUXDB_INIT_BUCKET: edge_metrics
      DOCKER_INFLUXDB_INIT_RETENTION: 72h
    volumes: [influx-data:/var/lib/influxdb2]
    restart: always
    networks: [shieldnet-edge]

  sn-features:
    build: ./features
    ports: ["8002:8002"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      INFLUX_URL: http://influxdb:8086
      ZONE_ID: ${ZONE_ID}
    depends_on: [kafka, influxdb]
    restart: always
    networks: [shieldnet-edge]

  sn-inference:
    build: ./inference
    ports: ["8001:8001"]
    volumes: [models-data:/models]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      ZONE_ID: ${ZONE_ID}
      MODEL_PATH: /models
    depends_on: [kafka, sn-features]
    restart: always
    networks: [shieldnet-edge]

  sn-airo:
    build: ./airo
    ports: ["8003:8003"]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      MQTT_BROKER: mosquitto:1883
      SOC_WEBHOOK: ${SOC_WEBHOOK_URL}
      ZONE_ID: ${ZONE_ID}
    depends_on: [kafka, sn-inference]
    restart: always
    networks: [shieldnet-edge]

  sn-fl-client:
    build: ./fl_client
    ports: ["8004:8004"]
    volumes: [models-data:/models]
    environment:
      FL_SERVER: ${FL_SERVER_ADDRESS}:9080
      ZONE_ID: ${ZONE_ID}
      FL_INTERVAL_MINUTES: 60
    depends_on: [sn-inference]
    restart: always
    networks: [shieldnet-edge]

  sn-agent:
    build: ./agent_api
    ports: ["8000:8000"]
    environment:
      ZONE_ID: ${ZONE_ID}
      INFLUX_URL: http://influxdb:8086
      JWT_SECRET: ${JWT_SECRET}
    restart: always
    networks: [shieldnet-edge]

  zeek:
    image: zeek/zeek:latest
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./config/zeek:/usr/local/zeek/share/zeek/site/custom
      - ./logs/zeek:/data/zeek/logs
    command: zeek -i eth0 local site/custom/iot-baseline.zeek site/custom/mqtt-anomaly.zeek site/custom/scan-detector.zeek
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    ports: ["9100:9100"]
    restart: always
    networks: [shieldnet-edge]
