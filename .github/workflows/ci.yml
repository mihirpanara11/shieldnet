name: ShieldNet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scikit-learn xgboost joblib pytest flwr fastapi uvicorn pydantic websockets python-jose

      - name: Syntax check
        run: |
          python -c "
          import os, py_compile
          errors = []
          for root, dirs, files in os.walk('.'):
              if 'node_modules' in root or '__pycache__' in root:
                  continue
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))
          if errors:
              for e in errors:
                  print(e)
              exit(1)
          print('All Python files OK')
          "

      - name: Unit tests
        run: python -m pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: python -m pytest tests/integration/ -v --tb=short

  dashboard:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx tsc --noEmit && npm run build
