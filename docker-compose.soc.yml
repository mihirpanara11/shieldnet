version: "3.9"

networks:
  shieldnet-soc:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  elastic-data:

services:
  postgres:
    image: postgres:15
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: shieldnet_soc
      POSTGRES_USER: shieldnet
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    restart: always
    networks: [shieldnet-soc]

  redis:
    image: redis:7.2
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    restart: always
    networks: [shieldnet-soc]

  elasticsearch:
    image: elasticsearch:8.11.0
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    volumes: [elastic-data:/usr/share/elasticsearch/data]
    restart: always
    networks: [shieldnet-soc]

  soc-api:
    build: ./soc_api
    ports: ["8080:8080"]
    environment:
      DATABASE_URL: postgresql+asyncpg://shieldnet:${DATABASE_PASSWORD}@postgres:5432/shieldnet_soc
      REDIS_URL: redis://redis:6379/0
      FL_SERVER_PORT: 9080
    depends_on: [postgres, redis]
    restart: always
    networks: [shieldnet-soc]

  fl-server:
    build: ./fl_server
    ports: ["9080:9080"]
    restart: always
    networks: [shieldnet-soc]

  grafana:
    image: grafana/grafana:10.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    restart: always
    networks: [shieldnet-soc]

  prometheus:
    image: prom/prometheus:v2.48.0
    ports: ["9090:9090"]
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks: [shieldnet-soc]
