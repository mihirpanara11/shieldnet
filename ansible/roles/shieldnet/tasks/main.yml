---
- name: Create ShieldNet directory structure
  file:
    path: "/opt/shieldnet/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - config/mosquitto
    - config/zeek
    - config/kafka
    - certs
    - models
    - logs
    - data

- name: Deploy docker-compose
  copy:
    src: docker-compose.yml
    dest: /opt/shieldnet/docker-compose.yml
    mode: '0644'

- name: Deploy .env
  template:
    src: .env.j2
    dest: /opt/shieldnet/.env
    mode: '0600'

- name: Pull and start ShieldNet services
  docker_compose:
    project_src: /opt/shieldnet
    pull: yes
    state: present
