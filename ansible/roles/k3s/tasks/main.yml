---
- name: Install K3s server
  shell: |
    curl -sfL https://get.k3s.io | sh -s - server \
      --disable traefik \
      --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s
  when: inventory_hostname in groups.get('k3s_primary', [])

- name: Get K3s node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  when: inventory_hostname in groups.get('k3s_primary', [])

- name: Install K3s agent
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://{{ hostvars[groups.k3s_primary[0]].ansible_host }}:6443 \
      K3S_TOKEN={{ hostvars[groups.k3s_primary[0]].k3s_token.content | b64decode }} sh -
  args:
    creates: /usr/local/bin/k3s
  when: inventory_hostname in groups.get('k3s_workers', [])
