global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'shieldnet-agent'
    static_configs:
      - targets: ['sn-agent:8000']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
