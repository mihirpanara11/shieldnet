syntax = "proto3";
package shieldnet.airo;

message ThreatEvent {
  string  incident_id        = 1;
  string  device_id          = 2;
  string  zone_id            = 3;
  string  timestamp          = 4;
  string  threat_class       = 5;
  float   confidence_score   = 6;
  string  decision           = 7;
  float   score_lstm         = 8;
  float   score_if           = 9;
  float   score_ae           = 10;
  string  device_category    = 11;
  string  device_mac         = 12;
  string  device_ip          = 13;
}

message AIROResponse {
  string  incident_id          = 1;
  string  playbook_executed    = 2;
  repeated string actions_taken = 3;
  string  status               = 4;
  int64   containment_time_ms  = 5;
  string  error_message        = 6;
}

message OverrideCommand {
  string  device_id    = 1;
  string  zone_id      = 2;
  string  action       = 3;
  int64   duration_sec = 4;
  string  operator_id  = 5;
  string  reason       = 6;
}

message OverrideResponse {
  string  command_id             = 1;
  string  status                 = 2;
  int64   estimated_complete_ms  = 3;
}

service AIROService {
  rpc HandleThreat    (ThreatEvent)       returns (AIROResponse);
  rpc ManualOverride  (OverrideCommand)   returns (OverrideResponse);
  rpc CancelAction    (OverrideCommand)   returns (OverrideResponse);
}
